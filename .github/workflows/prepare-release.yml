name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      suffix:
        description: Release suffix, for example 0.1.0
        required: true
        type: string
      codename:
        description: Release codename, for example Uplink
        required: true
        type: string
      eap:
        description: Mark the release as EAP / prerelease
        required: true
        type: boolean
      skip_tests:
        description: Skip release test runners before building installers
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - name: Restrict manual release workflow to an0nn30
        run: |
          if [ "${GITHUB_ACTOR}" != "an0nn30" ]; then
            echo "::error::Only GitHub user an0nn30 may run Prepare Release."
            exit 1
          fi

  prepare:
    needs: authorize
    runs-on: ubuntu-24.04
    env:
      TERMLAB_VERSION_MODE: release
      VERSION: ${{ inputs.suffix }}
      CODENAME: ${{ inputs.codename }}
      EAP: ${{ inputs.eap }}
      SKIP_TESTS: ${{ inputs.skip_tests }}
    steps:
      - name: Require main branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::Run this workflow from main so the release tag is cut from the main branch."
            exit 1
          fi

      - name: Require release token
        run: |
          if [ -z "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "::error::Missing RELEASE_TOKEN secret. Use a token with contents:write so the pushed tag triggers the release build workflow."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
          ref: refs/heads/main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Bootstrap IntelliJ checkout
        run: |
          INTELLIJ_ROOT="$(dirname "$(pwd -P)")/intellij-community"
          echo "INTELLIJ_ROOT=$INTELLIJ_ROOT" >> "$GITHUB_ENV"
          ./scripts/ci/bootstrap_intellij.sh "$INTELLIJ_ROOT"

      - name: Refresh local main from origin
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Stamp release metadata
        run: python3 scripts/generate_version.py

      - name: Compute release tag
        id: metadata
        run: |
          python3 - <<'PY'
          import os
          import re
          import xml.etree.ElementTree as ET
          from pathlib import Path

          app_info = Path("customization/resources/idea/TermLabApplicationInfo.xml")
          root = ET.parse(app_info).getroot()
          ns = {"app": "http://jetbrains.org/intellij/schema/application-info"}
          version = root.find("app:version", ns)
          if version is None:
              raise SystemExit("version element missing")

          codename = (version.get("codename") or "").strip()
          major = (version.get("major") or "").strip()
          minor = (version.get("minor") or "").strip()
          suffix = (version.get("suffix") or "").strip()
          eap = (version.get("eap") or "false").strip().lower()

          if not codename:
              raise SystemExit("codename is empty")
          if re.search(r'[\s~^:?*\\[\\]]', codename) or "/" in codename:
              raise SystemExit(f"codename '{codename}' is not safe for a Git tag")

          tag = f"{codename}-{major}.{minor}-{suffix}"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"tag={tag}\n")
              fh.write(f"prerelease={'true' if eap == 'true' else 'false'}\n")
              fh.write(f"skip_tests={os.environ['SKIP_TESTS'].strip().lower()}\n")
          PY

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit release version bump
        id: commit
        run: |
          git add customization/version.properties customization/resources/idea/TermLabApplicationInfo.xml
          if git diff --cached --quiet; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(release): prepare ${{ steps.metadata.outputs.tag }}"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Push release commit
        if: steps.commit.outputs.created == 'true'
        run: |
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to push release commit to main after 3 attempts."
              exit 1
            fi

            git fetch origin main
            git rebase origin/main
          done

      - name: Replace existing release tag
        run: |
          TAG="${{ steps.metadata.outputs.tag }}"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            git tag -d "$TAG"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git push origin ":refs/tags/$TAG"
          fi

      - name: Create and push release tag
        run: |
          TAG="${{ steps.metadata.outputs.tag }}"
          git tag -a "$TAG" -m "$(printf 'Release %s\nskip-tests: %s\n' "$TAG" "${{ steps.metadata.outputs.skip_tests }}")"
          git push origin "refs/tags/$TAG"
