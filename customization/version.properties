# TermLab product version — single source of truth.
#
# Format: X, X.Y, or X.Y.Z (missing parts default to 0). This value is
# stamped into customization/resources/idea/TermLabApplicationInfo.xml as
#     <version major="2026" minor="2" patch="Z" suffix="X.Y.Z (...)" .../>
# by scripts/generate_version.py. The platform major/minor come from the
# pinned IntelliJ build; patch comes from the third segment here. The short
# commit SHA is appended to suffix for dev builds and omitted in release mode.
#
# Edit this file directly, or override at build time without editing:
#     VERSION=0.2.0 make termlab
#     VERSION=0.2.0 make termlab-installers
# When $VERSION is set, the script persists it back to product.version.
product.version=0.1.0
